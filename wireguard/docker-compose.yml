services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:1.0.20250521-r1-ls105 # renovate: datasource=docker
    container_name: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      SERVERURL: ${SERVERURL}
      SERVERPORT: ${SERVERPORT}
      PEERS: ${PEERS}
      PEERDNS: auto
      INTERNAL_SUBNET: ${INTERNAL_SUBNET}
      ALLOWEDIPS: 0.0.0.0/0
      LOG_CONFS: true
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${SERVERPORT}:51820/udp"
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 200m
          cpus: "0.25"
        reservations:
          memory: 100m
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  default:
    name: wireguard_network
