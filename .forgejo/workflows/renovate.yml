name: Renovate

on:
  schedule:
    - cron: '0 8 * * 6'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "Key length: $(wc -c < ~/.ssh/id_ed25519)"
          echo "Key lines: $(wc -l < ~/.ssh/id_ed25519)"
          ssh-keyscan -p 22 homelab-server >> ~/.ssh/known_hosts 2>/dev/null
          echo "Known hosts: $(cat ~/.ssh/known_hosts | wc -l) entries"
          ssh -v -i ~/.ssh/id_ed25519 -p 22 deploy@homelab-server "echo SSH_OK" 2>&1 | tail -20
