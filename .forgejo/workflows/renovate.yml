name: Renovate

on:
  schedule:
    - cron: '0 8 * * 6'
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate via SSH
        uses: https://code.forgejo.org/actions/ssh-action@v1
        with:
          host: <tailscale-ip>
          username: note
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            docker compose -f /home/deploy/docker/renovate/compose.yml \
              --env-file /home/deploy/docker/renovate/.env \
              run --rm renovate
