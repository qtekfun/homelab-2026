name: Security Scan (Trivy)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 4 * * 0'

jobs:
  scan:
    name: Scan Secrets and Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6

      - name: Run Trivy
        uses: https://code.forgejo.org/aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          scanners: 'vuln,secret,misconfig'
          severity: 'CRITICAL,HIGH'
