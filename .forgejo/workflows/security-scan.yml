name: Security Scan (Trivy)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 4 * * 0'

jobs:
  scan:
    name: Scan Secrets and Vulnerabilities
    runs-on: ubuntu-latest
    container:
      image: aquasec/trivy:latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6

      - name: Run Trivy
        run: |
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 0
