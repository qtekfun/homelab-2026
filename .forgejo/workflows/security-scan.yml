name: Security Scan (Trivy)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 4 * * 0'

jobs:
  scan:
    name: Scan Secrets and Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6

      - name: Install and Run Trivy
        run: |
          export TRIVY_VERSION=$(curl -s https://api.github.com/repos/aquasecurity/trivy/releases/latest | grep tag_name | cut -d'"' -f4 | tr -d 'v')
          curl -sfL https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz | tar -xzf - -C /usr/local/bin trivy
          trivy fs . \
            --scanners vuln,secret,misconfig \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format table \
            --exit-code 0
