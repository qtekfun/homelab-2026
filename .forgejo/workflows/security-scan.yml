name: Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  scan:
    name: Scan Secrets and Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Run Gitleaks and Grype via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: "192.168.188.6"
          USER: "note"
          DEPLOY_PATH: "/home/note/docker"
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 $HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/id_ed25519 -p 22 $USER@$HOST bash -s << 'ENDSSH'
            set -e
            cd /home/note/docker

            mkdir -p /home/note/.local/bin
            export PATH="/home/note/.local/bin:$PATH"

            if ! command -v gitleaks &>/dev/null; then
              echo "Installing gitleaks..."
              wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
              tar -xzf gitleaks_8.24.3_linux_x64.tar.gz gitleaks
              mv gitleaks /home/note/.local/bin/
              rm -f gitleaks_8.24.3_linux_x64.tar.gz
            fi

            if ! command -v grype &>/dev/null; then
              echo "Installing grype..."
              curl -sSfL https://raw.githubusercontent.com/anchore/grype/v0.88.0/install.sh | sh -s -- -b /home/note/.local/bin v0.88.0
            fi

            echo "=== Gitleaks: Secret Scan ==="
            gitleaks detect --source . --exit-code 1 --redact

            echo "=== Grype: Vulnerability Scan ==="
            grype db update || (grype db delete && grype db update)
            grype dir:. \
              --fail-on critical \
              --exclude './disabled/**' \
              --exclude './**/postgres/**' \
              --exclude './**/postgres-data/**' \
              --exclude './**/db-data/**' \
              --exclude './**/portainer-data/**' \
              --exclude './**/guac-db-data/**' \
              --exclude './guacamole/guac-db-data/**' \
              --exclude './immich/postgres/**' \
              --exclude './n8n/postgres-data/**' \
              --exclude './nextcloud/**' \
              --exclude './newm/**' \
              --exclude './forgejo-runner/data/.cache/**'
          ENDSSH
