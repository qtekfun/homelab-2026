name: Deploy on merge

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (e.g. ntfy, grafana). Leave empty to auto-detect.'
        required: false
        default: ''

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.diff.outputs.services }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: diff
        run: |
          # Manual dispatch with explicit service
          if [ -n "${{ github.event.inputs.service }}" ]; then
            SVC="${{ github.event.inputs.service }}"
            echo "services=[\"$SVC\"]" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Manual deploy: $SVC"
            exit 0
          fi

          # Auto-detect from git diff
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^[^/]+/(compose\.yml|docker-compose\.yml)' \
            | cut -d'/' -f1 | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Changed services: none"
            exit 0
          fi

          JSON="["
          FIRST=true
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON="$JSON,"
            fi
            JSON="$JSON\"$line\""
          done <<< "$CHANGED"
          JSON="$JSON]"

          echo "services=$JSON" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changed services: $JSON"

  deploy:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - name: Deploy ${{ matrix.service }}
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: "192.168.188.6"
          USER: "note"
          DEPLOY_PATH: "/home/note/docker"
        run: |
          SERVICE="${{ matrix.service }}"
          echo "Deploying: $SERVICE"
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 $HOST >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/id_ed25519 -p 22 $USER@$HOST "
            cd $DEPLOY_PATH/$SERVICE
            git pull
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          "
