name: Deploy on merge

on:
  push:
    branches: [master]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '^[^/]+/(compose\.yml|docker-compose\.yml)' \
            | cut -d'/' -f1 | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "Changed services: []"
            exit 0
          fi

          JSON="["
          FIRST=true
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON="$JSON,"
            fi
            JSON="$JSON\"$line\""
          done <<< "$CHANGED"
          JSON="$JSON]"

          echo "services=$JSON" >> $GITHUB_OUTPUT
          echo "Changed services: $JSON"

  deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Deploy ${{ matrix.service }}
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 yoshievolved >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -p 22 note@yoshievolved << 'ENDSSH'
            cd /home/note/docker/${{ matrix.service }}
            git pull
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          ENDSSH
