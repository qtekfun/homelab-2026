name: Deploy on merge

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      service:
        description: 'Stack to deploy (e.g. stacks/media/debrid). Leave empty to auto-detect.'
        required: false
        default: ''

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.diff.outputs.services }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: diff
        run: |
          # 1. Prioridad: Despliegue manual
          if [ -n "${{ github.event.inputs.service }}" ]; then
            SVC="${{ github.event.inputs.service }}"
            echo "services=[\"$SVC\"]" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Manual deploy: $SVC"
            exit 0
          fi

          # 2. Auto-detección: Busca cualquier compose modificado y extrae su directorio raíz
          # Filtra para ignorar cambios en archivos que no sean de despliegue
          CHANGED=$(git diff --name-only HEAD~1 HEAD \
            | grep -E '(compose\.yml|docker-compose\.yml)$' \
            | xargs -I {} dirname {} \
            | sort -u || true)

          if [ -z "$CHANGED" ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No services changed."
            exit 0
          fi

          # 3. Formatear lista a JSON Array para la matriz
          # Usamos printf para construir el JSON de forma segura sin dependencias externas
          JSON="["
          FIRST=true
          for line in $CHANGED; do
            if [ "$FIRST" = true ]; then FIRST=false; else JSON="$JSON,"; fi
            JSON="$JSON\"$line\""
          done
          JSON="$JSON]"

          echo "services=$JSON" >> $GITHUB_OUTPUT
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changed services: $JSON"

  deploy:
    needs: changes
    if: needs.changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - name: Deploy ${{ matrix.service }}
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: "192.168.188.6"
          USER: "note"
          DEPLOY_PATH: "/home/note/docker"
        run: |
          SERVICE="${{ matrix.service }}"
          echo "Processing: $SERVICE"

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 $HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Ejecución remota
          ssh -i ~/.ssh/id_ed25519 -p 22 $USER@$HOST "
            set -e
            if [ -d \"$DEPLOY_PATH/$SERVICE\" ]; then
              cd \"$DEPLOY_PATH/$SERVICE\"
              echo \"Updating $SERVICE in server...\"
              git pull origin master
              docker compose pull
              docker compose up -d --remove-orphans
              docker image prune -f
            else
              echo \"Error: Directory $DEPLOY_PATH/$SERVICE not found on host.\"
              exit 1
            fi
          "
