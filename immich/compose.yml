services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - ${THUMBS_LOCATION}:/usr/src/app/upload/thumbs
      - /etc/localtime:/etc/localtime:ro
      - ./logs:/var/log/immich
    env_file:
      - .env
    environment:
      - LOG_LEVEL=log
    depends_on:
      - redis
      - database
    restart: unless-stopped
    networks:
      - traefik
      - internal
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "auth.yourdomain.com:host-gateway"
    # group_add:
    #   - "44"
    #   - "992"
    # devices:
    #   - /dev/dri:/dev/dri
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${IMMICH_DOMAIN}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.services.${TRAEFIK_ROUTER_NAME}.loadbalancer.server.port=2283"
      - "traefik.http.middlewares.limit-buffering.buffering.maxRequestBodyBytes=0"
      - "traefik.http.middlewares.limit-buffering.buffering.maxResponseBodyBytes=0"
      - "traefik.http.middlewares.limit-buffering.buffering.memRequestBodyBytes=2097152"
      - "traefik.http.middlewares.limit-buffering.buffering.memResponseBodyBytes=2097152"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.middlewares=limit-buffering"

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    volumes:
      - /mnt/immich/model-cache:/cache
    depends_on:
      - immich-server
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    # group_add:
    #   - "44"
    #   - "992"
    # devices:
    #   - /dev/dri:/dev/dri
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048m

  redis:
    container_name: immich_redis
    image: redis:8.6-alpine
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
        reservations:
          memory: 64m

  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - ./postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    command: >
      postgres
      -c shared_preload_libraries=vectors.so
      -c search_path="$$user",public,vectors
      -c logging_collector=on
      -c max_wal_size=2GB
      -c shared_buffers=512MB
      -c wal_compression=on

networks:
  traefik:
    external: true
  internal:
    internal: true
