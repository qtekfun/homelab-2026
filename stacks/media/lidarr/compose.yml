services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.0 # renovate: datasource=docker
    container_name: lidarr
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/config
      - /mnt/music:/music
      - /mnt/downloads:/downloads
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
    networks:
      - traefik
      - media
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lidarr.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.lidarr.entrypoints=websecure"
      - "traefik.http.routers.lidarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.lidarr.middlewares=authelia-auth@file"
      - "traefik.http.services.lidarr.loadbalancer.server.port=8686"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8686/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

networks:
  traefik:
    external: true
  media:
    external: true
