services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1 # renovate: datasource=docker
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${QBIT_WEBUI_PORT:-8090}:8080"   # qBittorrent WebUI
      - "8000:8000"                        # Gluetun control API
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/gluetun:/gluetun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Netherlands}
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET:-192.168.188.0/24}
      - UPDATER_PERIOD=24h
    networks:
      - traefik
      - media
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
        reservations:
          memory: 64m

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4 # renovate: datasource=docker
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data/qbittorrent:/config
      - /mnt/downloads:/downloads
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
      - WEBUI_PORT=8080
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

networks:
  traefik:
    external: true
  media:
    external: true
