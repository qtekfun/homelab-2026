services:
  navidrome:
    image: deluan/navidrome:0.60.3 # renovate: datasource=docker
    container_name: navidrome
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DATA_DIR}/data:/data
      - ${DATA_DIR}/music:/music:ro
    environment:
      - TZ=${TZ:-Europe/Madrid}
      - ND_MUSICFOLDER=/music
      - ND_DATAFOLDER=/data
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
      - ND_SESSIONTIMEOUT=24h
      - ND_DEFAULTDOWNSAMPLINGFORMAT=opus
    networks:
      - traefik
      - media
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.navidrome.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.navidrome.entrypoints=websecure"
      - "traefik.http.routers.navidrome.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.navidrome.middlewares=crowdsec-bouncer@file"
      - "traefik.http.services.navidrome.loadbalancer.server.port=4533"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4533/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
        reservations:
          memory: 64m

networks:
  traefik:
    external: true
  media:
    external: true
