services:
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1 # renovate: datasource=docker
    container_name: radarr
    restart: unless-stopped
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DATA_DIR}:/config
      - /mnt/downloads:/downloads
      - /mnt/movies:/movies
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
    networks:
      - traefik
      - media
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.routers.radarr.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.radarr.middlewares=authelia-auth@file"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

networks:
  traefik:
    external: true
  media:
    external: true
