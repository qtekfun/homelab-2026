services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.3.21 # renovate: datasource=docker
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-Europe/Madrid}
    networks:
      - media
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m

networks:
  media:
    external: true
