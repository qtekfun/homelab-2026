services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1 # renovate: datasource=docker
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "${QBIT_WEBUI_PORT:-8080}:8080"   # qBittorrent WebUI
      - "8000:8000"                        # Gluetun control API
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/gluetun
    environment:
      - TZ=${TZ}
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${WIREGUARD_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Netherlands}
      - FIREWALL_OUTBOUND_SUBNETS=${LAN_SUBNET:-192.168.1.0/24}
      - UPDATER_PERIOD=24h
    networks:
      - traefik
      - media
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
        reservations:
          memory: 64m

networks:
  traefik:
    external: true
  media:
    external: true
