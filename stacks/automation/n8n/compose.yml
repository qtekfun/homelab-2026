services:
  n8n:
    image: n8nio/n8n:2.18.3 # renovate: datasource=docker
    container_name: n8n_app
    restart: unless-stopped
    init: true
    env_file:
      - .env
    volumes:
      - ${DATA_DIR}/data:/home/node/.n8n
      - ${DATA_DIR}/files:/files
      - ${LOGS_DIR}/n8n:/var/log/n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik
      - n8n_ntwrk
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.middlewares=authelia-auth@file"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.priority=1"
      - "traefik.http.services.${TRAEFIK_ROUTER_NAME}.loadbalancer.server.port=5678"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.rule=Host(`${TRAEFIK_DOMAIN}`) && PathPrefix(`/webhook/`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.service=${TRAEFIK_ROUTER_NAME}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.priority=10"

  postgres:
    image: postgres:17 # renovate: datasource=docker
    container_name: n8n_postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${DATA_DIR}/postgres:/var/lib/postgresql/data
    networks:
      - n8n_ntwrk
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  traefik:
    external: true
  n8n_ntwrk:
    name: n8n_ntwrk
    internal: true
