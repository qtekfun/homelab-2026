global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'node-exporter-main'
    static_configs:
      - targets: ['node-exporter:9100']

  # - job_name: 'node-exporter-remote'
  #   static_configs:
  #     - targets: ['192.168.188.15:9100']

  # - job_name: 'cadvisor-remote'
  #   static_configs:
  #     - targets: ['192.168.188.15:8080']

rule_files:
  - "/etc/prometheus/alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
