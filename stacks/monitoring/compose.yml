services:
  prometheus:
    image: prom/prometheus:v3.10.0 # renovate: datasource=docker
    container_name: monitoring-prometheus-1
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - cadvisor
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:9090/-/healthy -O- | grep -q 'Prometheus Server is Healthy' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  grafana:
    image: grafana/grafana:12.4.2 # renovate: datasource=docker
    container_name: monitoring-grafana-1
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "https://${GRAFANA_DOMAIN}"
    networks:
      - monitoring
      - traefik
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.50"
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:3000/api/health -O- | grep -q 'ok' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.middlewares=authelia-auth@file"
      - "traefik.http.services.${TRAEFIK_ROUTER_NAME}.loadbalancer.server.port=3000"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1 # renovate: datasource=docker
    container_name: monitoring-cadvisor-1
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
      - SYS_PTRACE
      - SYS_ADMIN
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 128m

  node-exporter:
    image: prom/node-exporter:v1.10.2 # renovate: datasource=docker
    container_name: monitoring-node-exporter-1
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
        reservations:
          memory: 32m

  alertmanager:
    image: prom/alertmanager:v0.31.1 # renovate: datasource=docker
    container_name: monitoring-alertmanager-1
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/entrypoint.sh:/entrypoint.sh:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
    depends_on:
      - prometheus
    networks:
      - monitoring
      - traefik
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
        reservations:
          memory: 32m
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:9093/-/healthy -O- | grep -q 'OK' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - NTFY_DOMAIN=${NTFY_DOMAIN}
      - NTFY_USER=${NTFY_USER}
      - NTFY_PASSWORD=${NTFY_PASSWORD}
      - NTFY_ALERT_TOPIC=${NTFY_ALERT_TOPIC}

volumes:
  grafana-data: {}
  prometheus-data: {}

networks:
  monitoring:
    name: monitoring
    internal: true
  traefik:
    external: true
