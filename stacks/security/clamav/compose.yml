services:
  clamav:
    image: clamav/clamav:1.5.2-33 # renovate: datasource=docker
    container_name: clamav
    restart: unless-stopped
    volumes:
      - ${DATA_DIR}:/var/lib/clamav
      - ${DATA_DIR}/clamd.conf:/etc/clamav/clamd.conf:ro
    networks:
      - clamav
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s

networks:
  clamav:
    name: clamav
