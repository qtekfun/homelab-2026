services:
  n8n:
    image: n8nio/n8n:2.13.1 # renovate: datasource=docker
    container_name: n8n_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/home/node/.n8n
      - ./files:/files
    networks:
      - traefik
      - n8n_ntwrk
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 256m
    labels:
      - "traefik.enable=true"
      # Main router — protected by Authelia
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.middlewares=authelia-auth@file"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.priority=1"
      - "traefik.http.services.${TRAEFIK_ROUTER_NAME}.loadbalancer.server.port=5678"
      # Webhook router — public, no Authelia
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.rule=Host(`${TRAEFIK_DOMAIN}`) && PathPrefix(`/webhook/`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.entrypoints=websecure"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.service=${TRAEFIK_ROUTER_NAME}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-webhooks.priority=10"

networks:
  traefik:
    external: true
  n8n_ntwrk:
    name: n8n_ntwrk
    internal: true
