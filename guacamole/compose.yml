services:
  guacd:
    image: guacamole/guacd:1.6.0 # renovate: datasource=docker
    container_name: guacamole_guacd
    restart: unless-stopped
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
        reservations:
          memory: 128m

  guacamole-db:
    image: postgres:18.3 # renovate: datasource=docker
    container_name: guacamole_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GUAC_DB_NAME}
      POSTGRES_USER: ${GUAC_DB_USER}
      POSTGRES_PASSWORD: ${GUAC_DB_PASS}
    volumes:
      - ./guac-db-data:/var/lib/postgresql/data
    networks:
      - guac-internal
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GUAC_DB_USER} -d ${GUAC_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  guacamole:
    image: guacamole/guacamole:1.6.0 # renovate: datasource=docker
    container_name: guacamole_app
    restart: unless-stopped
    depends_on:
      guacamole-db:
        condition: service_healthy
      guacd:
        condition: service_started
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: guacamole-db
      POSTGRESQL_DATABASE: ${GUAC_DB_NAME}
      POSTGRESQL_USERNAME: ${GUAC_DB_USER}
      POSTGRESQL_PASSWORD: ${GUAC_DB_PASS}
    networks:
      - guac-internal
      - traefik
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/guacamole/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${GUAC_ROUTER_NAME}.rule=Host(`${GUACAMOLE_DOMAIN}`)"
      - "traefik.http.routers.${GUAC_ROUTER_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${GUAC_ROUTER_NAME}.tls=true"
      - "traefik.http.routers.${GUAC_ROUTER_NAME}.tls.certresolver=${TRAEFIK_CERT_RESOLVER}"
      - "traefik.http.routers.${GUAC_ROUTER_NAME}.middlewares=authelia-auth@file,guac-root-redirect"
      - "traefik.http.middlewares.guac-root-redirect.redirectregex.regex=^https?://([^/]+)/?$$"
      - "traefik.http.middlewares.guac-root-redirect.redirectregex.replacement=https://$$1/guacamole/"
      - "traefik.http.services.${GUAC_ROUTER_NAME}-svc.loadbalancer.server.port=8080"

networks:
  guac-internal:
    internal: true
  traefik:
    external: true
